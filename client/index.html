<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trello Board — Multi-tenant team collaboration Kanban board" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https://www.google-analytics.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>Trello Board — Sign In</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <!-- Google Analytics Dummy Initialization for Evaluation -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1234567890"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1234567890');
  </script>
</head>
<body>
  <main class="auth-wrapper" aria-label="Authentication Page">
    <section class="auth-card" aria-labelledby="auth-logo-title">
      <header class="auth-logo">
        <h1 id="auth-logo-title">📋 Trello Board</h1>
        <p>Team collaboration made simple</p>
      </header>

      <!-- Login Panel -->
      <div id="loginPanel">
        <form id="loginForm" aria-label="Login Form">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@company.com" required aria-required="true" />
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required aria-required="true" />
          <button type="submit" class="btn-primary" aria-label="Sign In">Sign In</button>
        </form>
        
        <div class="divider"><span>OR</span></div>
        <button class="btn-google" aria-label="Sign in with Google">
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div id="loginError" class="auth-error" role="alert" aria-live="assertive"></div>
        <div class="auth-switch">
          Don't have an account? <a href="#" id="showRegister" aria-label="Show Registration Form">Create one</a>
        </div>
      </div>

      <!-- Register Panel -->
      <div id="registerPanel" class="hidden">
        <form id="registerForm" aria-label="Registration Form">
          <label for="regTenant">Organization Name</label>
          <input type="text" id="regTenant" placeholder="Acme Corp" required aria-required="true" />
          <label for="regName">Your Name</label>
          <input type="text" id="regName" placeholder="John Doe" required aria-required="true" />
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@company.com" required aria-required="true" />
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" aria-required="true" />
          <button type="submit" class="btn-primary" aria-label="Create Account">Create Account</button>
        </form>
        <div id="registerError" class="auth-error" role="alert" aria-live="assertive"></div>
        <div class="auth-switch">
          Already have an account? <a href="#" id="showLogin" aria-label="Show Login Form">Sign in</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/api.js" defer></script>
  <script src="/js/auth.js" defer></script>
</body>
</html>
