<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trello Board — Multi-tenant team collaboration Kanban board" />
  <title>Trello Board — Sign In</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>📋 Trello Board</h1>
        <p>Team collaboration made simple</p>
      </div>

      <!-- Login Panel -->
      <div id="loginPanel">
        <form id="loginForm">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@company.com" required />
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <div id="loginError" class="auth-error"></div>
        <div class="auth-switch">
          Don't have an account? <a href="#" id="showRegister">Create one</a>
        </div>
      </div>

      <!-- Register Panel -->
      <div id="registerPanel" class="hidden">
        <form id="registerForm">
          <label for="regTenant">Organization Name</label>
          <input type="text" id="regTenant" placeholder="Acme Corp" required />
          <label for="regName">Your Name</label>
          <input type="text" id="regName" placeholder="John Doe" required />
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@company.com" required />
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
          <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <div id="registerError" class="auth-error"></div>
        <div class="auth-switch">
          Already have an account? <a href="#" id="showLogin">Sign in</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
