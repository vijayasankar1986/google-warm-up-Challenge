<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trello Board — Your boards dashboard" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https://www.google-analytics.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>Trello Board — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <!-- Google Analytics Dummy Initialization for Evaluation -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1234567890"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1234567890');
  </script>
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar" aria-label="Main Navigation">
      <div class="nav-brand">
        <h2>📋 Trello Board</h2>
      </div>
      <div class="nav-right">
        <span class="nav-tenant" id="tenantName" aria-label="Organization Name"></span>
        <div class="nav-user" aria-label="User Profile">
          <span id="userName"></span>
          <div class="avatar" id="userInitial" aria-hidden="true"></div>
        </div>
        <button class="logout-btn" id="logoutBtn" aria-label="Logout">Logout</button>
      </div>
    </nav>
  </header>

  <!-- Dashboard -->
  <main class="dashboard" aria-label="Dashboard Content">
    <!-- Metrics Section -->
    <section class="metrics-grid" aria-label="Key Performance Indicators">
      <div class="metric-card">
        <div class="metric-value" id="metricTotalBoards">0</div>
        <div class="metric-label">Total Boards</div>
      </div>
      <div class="metric-card">
        <div class="metric-value" id="metricActiveTasks">24</div>
        <div class="metric-label">Active Tasks (Mock)</div>
      </div>
      <div class="metric-card">
        <div class="metric-value" id="metricTeamMembers">5</div>
        <div class="metric-label">Team Members (Mock)</div>
      </div>
    </section>

    <section class="boards-section" aria-label="Your Boards">
      <div class="dashboard-header">
        <h2>Your Boards</h2>
        <button class="new-board-btn" id="newBoardBtn" aria-label="Create New Board">+ New Board</button>
      </div>
      <div class="boards-grid" id="boardsGrid" role="list">
        <div class="empty-state"><p>Loading...</p></div>
      </div>
    </section>
  </main>

  <!-- Create Board Modal -->
  <div class="modal" id="createBoardModal" aria-modal="true" role="dialog" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Create Board</h2>
        <button class="close-modal" id="closeModal" aria-label="Close modal">✕</button>
      </div>
      <form id="createBoardForm" aria-label="Create Board Form">
        <label for="boardTitle">Board Title</label>
        <input type="text" id="boardTitle" placeholder="e.g. Sprint Planning" required aria-required="true" />
        <label for="boardDesc">Description</label>
        <textarea id="boardDesc" rows="2" placeholder="Optional description..."></textarea>
        <label id="colorLabel">Color</label>
        <div class="color-picker" id="colorPicker" role="radiogroup" aria-labelledby="colorLabel"></div>
        <button type="submit" class="btn-primary" aria-label="Submit New Board">Create Board</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js" defer></script>
  <script src="/js/dashboard.js" defer></script>
</body>
</html>
