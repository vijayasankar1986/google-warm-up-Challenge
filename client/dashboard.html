<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trello Board — Your boards dashboard" />
  <title>Trello Board — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <h2>📋 Trello Board</h2>
    </div>
    <div class="nav-right">
      <span class="nav-tenant" id="tenantName"></span>
      <div class="nav-user">
        <span id="userName"></span>
        <div class="avatar" id="userInitial"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- Dashboard -->
  <main class="dashboard">
    <div class="dashboard-header">
      <h2>Your Boards</h2>
      <button class="new-board-btn" id="newBoardBtn">+ New Board</button>
    </div>
    <div class="boards-grid" id="boardsGrid">
      <div class="empty-state"><p>Loading...</p></div>
    </div>
  </main>

  <!-- Create Board Modal -->
  <div class="modal" id="createBoardModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Board</h2>
        <button class="close-modal" id="closeModal">✕</button>
      </div>
      <form id="createBoardForm">
        <label>Board Title</label>
        <input type="text" id="boardTitle" placeholder="e.g. Sprint Planning" required />
        <label>Description</label>
        <textarea id="boardDesc" rows="2" placeholder="Optional description..."></textarea>
        <label>Color</label>
        <div class="color-picker" id="colorPicker"></div>
        <button type="submit" class="btn-primary">Create Board</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
