<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trello Board — Kanban board view" />
  <title>Trello Board — Board</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <button class="back-btn" id="backBtn">← Back</button>
      <h2>📋 Trello Board</h2>
    </div>
    <div class="nav-right">
      <div class="nav-user">
        <div class="avatar" id="userInitial"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- Board Header -->
  <div class="board-header">
    <h2 id="boardTitle">Loading...</h2>
  </div>

  <!-- Lists -->
  <div class="lists-wrapper" id="listsContainer">
    <div class="empty-state"><p>Loading board...</p></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/board.js"></script>
</body>
</html>
